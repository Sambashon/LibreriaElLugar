services:
  libreriaWeb:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
    container_name: apache_web
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - db
    networks:
      - libreria-network
    restart: unless-stopped

  libreriaDB:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - libreria-network
    
volumes:
  mariadb_data:

networks:
  libreria-network: