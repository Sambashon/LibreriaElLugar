services:
  libreriaweb:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: apache_web
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ../../docs:/var/www/html
    depends_on:
      - libreriadb
    networks:
      - libreria-network
    restart: unless-stopped
    
    environment:
      DB_HOST: libreriadb
      DB_NAME: ${DB_NAME}
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

  libreriadb:
    image: mariadb:latest
    container_name: mariadb
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - libreria-network
    
volumes:
  mariadb_data:

networks:
  libreria-network: