<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería | El Lugar</title>
    <link rel="icon" href="Resources/logos/libreriasimple.jpg" type="image/png">

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="src/css/components.css">

    <style>
      *{
        box-sizing: border-box;
      }
      body{
        display: flex;
        flex-direction: row;
      }
      .sidebar{
        background-color: #9da790;

        height: 100vh;
        width: 20vw;

        display: flex;
        align-items: center;
        justify-content: center;

      }
      .main{
        flex: 1;
        
        padding: 2rem 0rem 0rem 0rem;
        
        display: flex;
        flex-direction: column;

        background-color: #1B4D2E;
      }
      .nav{
        width: 100%;
        height: fit-content;
        border-bottom: 1px solid #23693eff;
        color: #EBE9DA;
        padding: 0rem 0rem 0rem 2rem;
      }
      .button{
        position: relative;
        border: none;
        background: transparent;
        cursor: pointer;
        padding: 0.5rem 1rem;
      }
      .button:hover{
        transition: unset;
        transform: unset;
        font-weight: bold;
      }

      .button::after{
        content: "";
        position: absolute;

        left: 50%;
        bottom: -1px;

        width: 0;
        height: 2px;

        background-color: #C8922B;

        transition: all 0.3s ease;
        transform: translateX(-50%);
      }
      .button2{
        background-color: #C8922B;
        width: fit-content ;
        padding: 10px 15px;
        border-radius: 20px;
        transition: all 0.3s ease;
      }
      .button2:hover{
        font-weight: 600;
        cursor: pointer;
        transform: translateY(-5px);
      }
      .header h1{
        color: #C8922B;
      }
      .header p{
        color: white;
      }
      .button.active::after{
        width: 80%;
      }
      .logo-container{
        width: 200px;
        height: auto;
        
      }
      .logo-container img{
        height: 100%;
        width: 100%;
        filter: drop-shadow(0 0 3px #444444);
      }

      .register{
        display: none;
        
      }
      .login{
        display: none;
      }

      .register.active, .login.active{
        padding: 2rem;
        display: flex;
        justify-content: center;
        flex-direction: column;
      }

      .row{
        width: 80%;
        height: fit-content;
        padding: 1rem 1rem 1rem 0px;

        display: flex;
        flex-direction: row;
        justify-content: space-between;
      }
      .column{
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      .column-2{
        height: 100%;
        width: 47%;
        display: flex;
        flex-direction: column;
      }
      label{
        margin-bottom: 0.5rem;
        font-family: "Fraunces", sans-serif;
        color: #EBE9DA;
      }
      input{
        font-family: "Plus Jakarta Sans", sans-serif;
        padding: 15px 5px;
        border-radius: 10px;
        border: #5c5c5c 1px solid;
        background-color: #133620;
        color: #EBE9DA;

        transition: all 0.3s ease;
        font-weight: 600;
      }
      input:focus{
        box-shadow: #23693eff 0px 0px 5px 2px;
      }
    </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo-container">
      <img src="Resources/logos/libreriaElLugar.png">
    </div>
  </aside>
  <main class="main">
    <nav class="nav">
      <button class="button active">Registrarse</button>
      <button class="button">Iniciar sesión</button>
    </nav>
    <div class="register active">
      <header class="header">
        <h1>Crea tu cuenta</h1>
        <p>Registrate y descubre miles de títulos a un clic de distancia.</p>
      </header>
      <form action="">
        <div class="row">
          <div class="column-2">
            <label for="nombre">Nombre</label>
            <input type="text" name="nombre" id="nombre" autocomplete="name" placeholder="Tu nombre...">
          </div>
          <div class="column-2">
            <label for="apellido">Apellido</label>
            <input type="text" name="apellido" id="apellido" autocomplete="family-name" placeholder="Tu apellido...">
          </div>
        </div>
        <div class="row">
          <div class="column">
            <label for="email">Correo electrónico</label>
            <input type="text" name="email" id="email" autocomplete="email" placeholder="Tu email...">
          </div>
        </div>
        <div class="row">
          <div class="column">
            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password" placeholder="••••••••">
          </div>
        </div>
        <div class="row" style="justify-content: center;">
          <input class="button2" type="submit" value="Crear Cuenta">
        </div>
      </form>
    </div>
    <!--___________________LOGIN________________________-->
    <div class="login">
      <header class="header">
        <h1>Bienvenido de nuevo</h1>
        <p>Inicia sesión para acceder a tu biblioteca.</p>
      </header>

      <form action="">
        <div class="row">
          <div class="column">
            <label for="login-email">Correo electrónico</label>
            <input 
              type="text" 
              name="login-email" 
              id="login-email" 
              autocomplete="email" 
              placeholder="Tu email..."
            >
          </div>
        </div>

        <div class="row">
          <div class="column">
            <label for="login-password">Contraseña</label>
            <input 
              type="password" 
              name="login-password" 
              id="login-password" 
              placeholder="••••••••"
            >
          </div>
        </div>

        <div class="row" style="justify-content: center;">
          <input class="button2" type="submit" value="Iniciar Sesión">
        </div>
      </form>
    </div>
  </main>
<script>
  const buttons = document.querySelectorAll(".button");

  const register = document.querySelector(".register");
  const login = document.querySelector(".login");

  buttons.forEach(button => {

    button.addEventListener("click", () => {

      // remover active de todos los botones
      buttons.forEach(btn => {
        btn.classList.remove("active");
      });

      // activar botón clickeado
      button.classList.add("active");

      // cambiar formularios
      if (button.textContent.includes("Registrarse")) {

        register.classList.add("active");
        login.classList.remove("active");

      } else {

        login.classList.add("active");
        register.classList.remove("active");

      }

    });

  });
</script>
</body>
</html>
